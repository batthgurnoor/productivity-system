spring.application.name=backend

# Server
server.port=8081

# H2 (dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:productivity;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT (dev only; override in prod)
app.jwt.secret=change-me-to-a-long-random-secret-change-me
app.jwt.accessTokenMinutes=60

# CORS
app.cors.allowedOrigins=http://localhost:*,http://127.0.0.1:*
